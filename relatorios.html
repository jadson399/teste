<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatórios — GestãoPro</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <script type="module">
    import { Auth, DataHelper, Theme, Format, showToast } from './app.js';
    import { renderLayout } from './layout.js';

    let charts = {};

    document.addEventListener('DOMContentLoaded', async () => {
      Theme.init();
      await renderLayout('Relatórios', 'Análise detalhada do seu negócio', 'relatorios');
      
      const pageContent = document.getElementById('pageContent');
      if (!pageContent) return;

      pageContent.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:32px; flex-wrap:wrap; gap:16px;">
          <div style="display:flex; gap:8px; background:var(--bg-card); padding:4px; border-radius:12px; border:1px solid var(--border-color);">
            <button class="btn-filter active" data-period="1">1 Mês</button>
            <button class="btn-filter" data-period="3">3 Meses</button>
            <button class="btn-filter" data-period="6">6 Meses</button>
            <button class="btn-filter" data-period="all">Acumulado</button>
          </div>
          <button class="btn btn-outline" id="printBtn">
            <i data-lucide="printer"></i> Imprimir Relatório
          </button>
        </div>

        <div class="grid-stats" style="margin-bottom:32px;">
          <div class="card">
            <p style="font-size:14px; font-weight:700; color:var(--text-muted); margin-bottom:8px;">Receita Total</p>
            <h2 id="repReceita" style="font-size:28px; font-weight:800; color:var(--success);">R$ 0,00</h2>
          </div>
          <div class="card">
            <p style="font-size:14px; font-weight:700; color:var(--text-muted); margin-bottom:8px;">Despesa Total</p>
            <h2 id="repDespesa" style="font-size:28px; font-weight:800; color:var(--danger);">R$ 0,00</h2>
          </div>
          <div class="card">
            <p style="font-size:14px; font-weight:700; color:var(--text-muted); margin-bottom:8px;">Lucro Líquido</p>
            <h2 id="repLucro" style="font-size:28px; font-weight:800; color:var(--primary);">R$ 0,00</h2>
          </div>
        </div>

        <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(400px, 1fr)); gap:32px;">
          <div class="card">
            <h3 style="margin-bottom:24px;">Evolução Mensal</h3>
            <canvas id="chartEvolucao" height="250"></canvas>
          </div>
          <div class="card">
            <h3 style="margin-bottom:24px;">Despesas por Categoria</h3>
            <canvas id="chartCategorias" height="250"></canvas>
          </div>
        </div>

        <!-- Botão Suporte WhatsApp -->
        <a href="https://wa.me/5579996069704?text=Olá! Preciso de suporte no sistema GestãoPro." target="_blank" class="fab-support" title="Falar com Suporte">
          <i data-lucide="message-circle" size="24"></i>
        </a>
      `;

      if (window.lucide) window.lucide.createIcons();
      initRelatorios();
    });

    async function initRelatorios() {
      const buttons = document.querySelectorAll('.btn-filter');
      
      const updateData = async (period) => {
        buttons.forEach(b => b.classList.remove('active'));
        const activeBtn = document.querySelector(\`[data-period="\${period}"]\`);
        if (activeBtn) activeBtn.classList.add('active');

        const transactions = await DataHelper.getAll('transactions');
        
        let filtered = transactions;
        if (period !== 'all') {
          const cutoff = new Date();
          cutoff.setMonth(cutoff.getMonth() - parseInt(period));
          filtered = transactions.filter(t => new Date(t.date) >= cutoff);
        }

        let receita = 0, despesa = 0;
        const catMap = {};
        const monthMap = {};

        filtered.forEach(t => {
          const val = parseFloat(t.amount || 0);
          const isIncome = (t.type === 'income' || t.type === 'receita' || t.type === 'entrada');
          
          if (isIncome) receita += val;
          else {
            despesa += val;
            const cat = t.category || 'Geral';
            catMap[cat] = (catMap[cat] || 0) + val;
          }

          const month = t.date.substring(0, 7); // YYYY-MM
          if (!monthMap[month]) monthMap[month] = { in: 0, out: 0 };
          if (isIncome) monthMap[month].in += val;
          else monthMap[month].out += val;
        });

        document.getElementById('repReceita').textContent = Format.currency(receita);
        document.getElementById('repDespesa').textContent = Format.currency(despesa);
        document.getElementById('repLucro').textContent = Format.currency(receita - despesa);

        renderCharts(monthMap, catMap);
      };

      const renderCharts = (monthMap, catMap) => {
        const months = Object.keys(monthMap).sort();
        const dataEvolucao = {
          labels: months.map(m => {
            const [y, mon] = m.split('-');
            const date = new Date(y, mon - 1);
            return date.toLocaleDateString('pt-BR', { month: 'short', year: '2-digit' });
          }),
          datasets: [
            { label: 'Receitas', data: months.map(m => monthMap[m].in), borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.1)', fill: true, tension: 0.4 },
            { label: 'Despesas', data: months.map(m => monthMap[m].out), borderColor: '#ef4444', backgroundColor: 'rgba(239,68,68,0.1)', fill: true, tension: 0.4 }
          ]
        };

        if (charts.evolucao) charts.evolucao.destroy();
        charts.evolucao = new Chart(document.getElementById('chartEvolucao'), {
          type: 'line',
          data: dataEvolucao,
          options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });

        const cats = Object.keys(catMap);
        const dataCats = {
          labels: cats,
          datasets: [{
            data: cats.map(c => catMap[c]),
            backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899']
          }]
        };

        if (charts.categorias) charts.categorias.destroy();
        charts.categorias = new Chart(document.getElementById('chartCategorias'), {
          type: 'doughnut',
          data: dataCats,
          options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
      };

      buttons.forEach(btn => {
        btn.onclick = () => updateData(btn.dataset.period);
      });

      document.getElementById('printBtn').onclick = () => window.print();

      updateData('1');
    }
  </script>

  <style>
    .btn-filter {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .btn-filter.active {
      background: var(--primary);
      color: white;
    }
    @media print {
      .sidebar, .topbar, .btn-filter, #printBtn, .fab-support { display: none !important; }
      .main-content { margin: 0 !important; padding: 0 !important; }
      .card { border: 1px solid #eee !important; box-shadow: none !important; }
    }
  </style>
</body>
</html>
